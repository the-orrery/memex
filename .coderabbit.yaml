language: en-US
tone_instructions: "Be concise, concrete, and focus on correctness, security, tests, and maintainability."

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  review_status: true
  review_details: false
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  prompt_for_ai_agents: true
  path_filters:
    - "!*.egg-info/**"
    - "!**/__pycache__/**"
    - "src/**"
    - "tests/**"
    - "docs/**"
    - ".github/**"
    - "pyproject.toml"
    - "README.md"
    - "SECURITY.md"
    - "lefthook.yml"
  path_instructions:
    - path: "src/**"
      instructions: |
        Treat README.md and docs/architecture.md as the source of truth for retrieval lanes, source registry behavior, qdrant sync semantics, and CLI contracts. Flag visible behavior changes that do not update tests and docs.
    - path: "tests/**"
      instructions: |
        Prefer tests that exercise lexical, semantic, hybrid, registry, compile, sync, and CLI behavior through fakes or temporary directories. Do not depend on real qdrant, embedding endpoints, local KB data, or machine-specific paths.
    - path: ".github/**"
      instructions: |
        Keep workflow permissions minimal, pin actions where workflows are local, and avoid introducing secrets into pull_request workflows.
        For reusable workflows, keep caller inputs explicit and do not add secrets: inherit unless private dependencies are intentionally enabled.
